version: 1
canonicalLocale: ko
canonicalRoute: /ko/multiscale
viewport:
  width: 1440
  height: 1024
defaults:
  stepProgress: 0.5
  preResetWaitMs: 220
  postResetWaitMs: 320
  zoomIndex: 2
  imageChecks:
    - type: occupancy
      minFraction: 0.012
      maxFraction: 0.62
    - type: centroid
      xRange: [0.22, 0.78]
      yRange: [0.18, 0.82]
  numericChecks:
    - type: metadata-present
      keys: [subsets, anchors]
scenes:
  # ── DNA MESO PAGES (trajectory-backed) ──
  # Data source: public/data/dna/ (binary assets from scripts/dna/run_pipeline.py)
  # AA: 36bp dsDNA built by MDNA (1476 heavy atoms, 72 residues, 2 chains)
  # CG melt: 100 × 80bp dsDNA in PBC box, NPT equilibrated, 1M steps

  - sceneId: meso.M1_atoms
    level: meso
    stepIndex: 0
    sceneKey: M1_atoms
    primaryObject: atomistic_dna_dodecamer
    visibleSubset: all_beads
    focusAnchor: local_duplex_center
    camera: { azimuthDeg: 34, elevationDeg: 12, rollDeg: 0, zoomIndex: 2, padding: 1.12 }
    timingWindows: { atomOpacity: [0.0, 0.2], beadOpacity: [0.85, 1.0] }
    requiredVisuals: [atomistic_atoms, atomistic_bonds, phosphorus_visible, nitrogen_visible, carbon_visible]
    forbiddenVisuals: [pair_shells, gr_shell, mlff_force_arrows, dft_surfaces]
    numericChecks:
      - { type: atom-count-min, min: 1400 }
    imageChecks:
      - { type: occupancy, minFraction: 0.02, maxFraction: 0.35 }
      - { type: color-presence, colorFamily: amber, minFraction: 0.001 }
      - { type: edge-density-min, minDensity: 0.002 }
      - { type: component-count-max, max: 80 }

  - sceneId: meso.M2_hulls
    level: meso
    stepIndex: 1
    sceneKey: M2_hulls
    primaryObject: atom_to_bead_morph
    visibleSubset: all_beads
    focusAnchor: local_duplex_center
    camera: { azimuthDeg: 56, elevationDeg: 15, rollDeg: 0, zoomIndex: 2, padding: 1.24 }
    timingWindows: { atomOpacity: [0.0, 0.55], beadOpacity: [0.2, 0.9], mappingOpacity: [0.25, 0.95] }
    requiredVisuals: [atomistic_atoms_fading, cg_beads_appearing, mapping_hulls_visible]
    forbiddenVisuals: [gr_shell, dft_surfaces]
    numericChecks:
      - { type: atom-count-min, min: 486 }
      - { type: subset-size-min, subset: all_beads, min: 16000 }
    imageChecks:
      - { type: occupancy, minFraction: 0.02, maxFraction: 0.45 }
      - { type: color-presence, colorFamily: amber, minFraction: 0.002 }
      - { type: edge-density-min, minDensity: 0.002 }
      - { type: component-count-max, max: 150 }

  - sceneId: meso.M3_beads
    level: meso
    stepIndex: 2
    sceneKey: M3_beads
    primaryObject: full_cg_bath_bond_emphasis
    visibleSubset: all_beads
    focusAnchor: bundle_center
    camera: { azimuthDeg: 35, elevationDeg: 26, rollDeg: 0, zoomIndex: 2, padding: 1.4 }
    timingWindows: { beadOpacity: [0.0, 0.3], bondGlowOpacity: [0.3, 0.95] }
    requiredVisuals: [full_cg_bath, cg_backbone_bonds, cg_rung_bonds, bond_glow_overlay]
    forbiddenVisuals: [atomistic_full_opacity, gr_shell]
    numericChecks:
      - { type: subset-size-min, subset: all_beads, min: 16000 }
      - { type: dna-duplex-count-min, min: 100 }
    imageChecks:
      - { type: occupancy, minFraction: 0.04, maxFraction: 0.55 }
      - { type: color-presence, colorFamily: cyan, minFraction: 0.001 }
      - { type: edge-density-min, minDensity: 0.003 }
      - { type: component-count-max, max: 250 }

  - sceneId: meso.M4_fullCG
    level: meso
    stepIndex: 3
    sceneKey: M4_fullCG
    primaryObject: cg_trajectory_playback
    visibleSubset: all_beads
    focusAnchor: bundle_center
    camera: { azimuthDeg: 22, elevationDeg: 26, rollDeg: 0, zoomIndex: 2, padding: 1.4 }
    timingWindows: { thermalAmplitude: [0.1, 0.95] }
    requiredVisuals: [full_cg_bath, trajectory_driven_motion, all_duplexes_visible]
    forbiddenVisuals: [browser_synthesized_noise, gr_shell]
    numericChecks:
      - { type: subset-size-min, subset: all_beads, min: 16000 }
    imageChecks:
      - { type: occupancy, minFraction: 0.04, maxFraction: 0.55 }
      - { type: component-count-max, max: 250 }

  - sceneId: meso.M5_boundary
    level: meso
    stepIndex: 4
    stepProgress: 0.5
    sceneKey: M5_boundary
    primaryObject: rdf_shell_on_full_bath
    visibleSubset: all_beads
    focusAnchor: pair_reference_center
    camera: { azimuthDeg: 48, elevationDeg: 20, rollDeg: 0, zoomIndex: 2, padding: 1.35 }
    timingWindows: { shellRadius: [0.05, 0.95], neighborReveal: [0.1, 0.95] }
    requiredVisuals: [full_cg_bath, reference_bead_highlighted, rdf_shell_overlay, dimmed_background_beads]
    forbiddenVisuals: [scene_replaced_by_correlation_only]
    numericChecks:
      - { type: subset-size-min, subset: all_beads, min: 16000 }
      - { type: reference-index-present }
    imageChecks:
      - { type: occupancy, minFraction: 0.03, maxFraction: 0.50 }
      - { type: color-presence, colorFamily: cyan, minFraction: 0.0005 }
      - { type: component-count-max, max: 300 }

  - sceneId: meso.M6_settle
    level: meso
    stepIndex: 5
    sceneKey: M6_settle
    primaryObject: full_cg_trajectory_settle
    visibleSubset: all_beads
    focusAnchor: bundle_center
    camera: { azimuthDeg: 35, elevationDeg: 32, rollDeg: 0, zoomIndex: 2, padding: 1.45 }
    timingWindows: { bundleOpacity: [0.0, 1.0] }
    requiredVisuals: [full_cg_bath, bundle_scale_view, multiple_duplexes_visible, trajectory_driven]
    forbiddenVisuals: [cropped_primary_object, local_subset_only]
    numericChecks:
      - { type: subset-size-min, subset: all_beads, min: 16000 }
      - { type: dna-duplex-count-min, min: 100 }
    imageChecks:
      - { type: occupancy, minFraction: 0.04, maxFraction: 0.55 }
      - { type: component-count-max, max: 250 }

  - sceneId: allatom.A1_resolution
    level: allatom
    stepIndex: 0
    sceneKey: A1_resolution
    primaryObject: explicit_atomistic_cell
    visibleSubset: scene_focus
    focusAnchor: scene_center
    camera: { azimuthDeg: 34, elevationDeg: 16, rollDeg: 0, zoomIndex: 2, padding: 1.02 }
    timingWindows: { systemOpacity: [0.0, 1.0], supportOpacity: [0.08, 0.95] }
    requiredVisuals: [periodic_box_visible, explicit_waters, explicit_solute_atoms]
    forbiddenVisuals: [oxygen_only_water_proxy]
    numericChecks:
      - { type: subset-size-min, subset: scene_focus, min: 80 }
      - { type: residue-count-min, residueName: CAF, min: 10 }
    imageChecks:
      - { type: occupancy, minFraction: 0.01, maxFraction: 0.36 }

  - sceneId: allatom.A2_forcefield
    level: allatom
    stepIndex: 1
    sceneKey: A2_forcefield
    primaryObject: local_forcefield_cutout
    visibleSubset: scene_focus
    focusAnchor: scene_center
    camera: { azimuthDeg: 62, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.14 }
    timingWindows: { bondedCue: [0.18, 0.62], nonBondedCue: [0.5, 0.95] }
    requiredVisuals: [focus_caffeine_visible, local_contacts]
    forbiddenVisuals: [full_cluster_clutter]
    numericChecks:
      - { type: subset-size-min, subset: scene_focus, min: 80 }
      - { type: water-count-range, min: 4, max: 8 }
    imageChecks:
      - { type: color-presence, colorFamily: cyan, minFraction: 0.001 }

  - sceneId: allatom.A3_nonuniformity
    level: allatom
    stepIndex: 2
    sceneKey: A3_nonuniformity
    primaryObject: local_nonuniformity_cutout
    visibleSubset: scene_focus
    focusAnchor: scene_center
    camera: { azimuthDeg: 74, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.1 }
    timingWindows: { systemOpacity: [0.0, 1.0], supportOpacity: [0.04, 0.9] }
    requiredVisuals: [focus_caffeine_visible, local_waters, asymmetric_solvent_arrangement]
    forbiddenVisuals: [full_cluster_clutter, giant_shell_blob, forcefield_equation]
    numericChecks:
      - { type: subset-size-min, subset: scene_focus, min: 70 }
    imageChecks:
      - { type: color-presence, colorFamily: cyan, minFraction: 0.001 }

  - sceneId: allatom.A4_ensemble
    level: allatom
    stepIndex: 3
    sceneKey: A4_ensemble
    primaryObject: condensed_ensemble_cell
    visibleSubset: scene_all
    focusAnchor: scene_center
    camera: { azimuthDeg: 34, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.06 }
    timingWindows: { referenceBoxOpacity: [0.0, 0.52], trailOpacity: [0.12, 0.52], motionOpacity: [0.56, 0.95] }
    requiredVisuals: [periodic_box_visible, explicit_waters, explicit_solute_atoms, sparse_motion]
    forbiddenVisuals: [single_solute_only, duplicated_boxes, protocol_only_static_view]
    numericChecks:
      - { type: subset-size-min, subset: scene_all, min: 1500 }
      - { type: box-visible }
    imageChecks:
      - { type: edge-density-min, minDensity: 0.001 }

  - sceneId: allatom.A5_readout
    level: allatom
    stepIndex: 4
    sceneKey: A5_readout
    primaryObject: atomistic_structure_readout
    visibleSubset: scene_focus
    focusAnchor: focus_center
    camera: { azimuthDeg: 40, elevationDeg: 20, rollDeg: 0, zoomIndex: 2, padding: 1.08 }
    timingWindows: { systemOpacity: [0.0, 1.0], supportOpacity: [0.04, 0.8] }
    requiredVisuals: [focus_caffeine_visible, nearby_waters, local_readout_cues]
    forbiddenVisuals: [giant_shell_blob, duplicated_full_motion_cloud, forcefield_equation]
    numericChecks:
      - { type: subset-size-min, subset: scene_focus, min: 60 }
    imageChecks:
      - { type: occupancy, minFraction: 0.012, maxFraction: 0.34 }

  - sceneId: mlff.L1_clouds
    level: mlff
    stepIndex: 0
    sceneKey: L1_clouds
    primaryObject: ion_hydration_neighborhood
    visibleSubset: expanded_local
    focusAnchor: focus_center
    camera: { azimuthDeg: 32, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.24 }
    timingWindows: { atomOpacity: [0.0, 1.0] }
    requiredVisuals: [focus_ion_visible, local_waters_visible]
    forbiddenVisuals: [giant_box_clutter]
    numericChecks:
      - { type: subset-size-min, subset: expanded_local, min: 60 }
    imageChecks:
      - { type: occupancy, minFraction: 0.012, maxFraction: 0.24 }

  - sceneId: mlff.L2_neighborhoods
    level: mlff
    stepIndex: 1
    sceneKey: L2_neighborhoods
    primaryObject: ion_local_cutoff_shell
    visibleSubset: expanded_local
    focusAnchor: focus_center
    camera: { azimuthDeg: 46, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.18 }
    timingWindows: { cutoffRadius: [0.1, 0.95] }
    requiredVisuals: [focus_ion_visible, cutoff_shell]
    forbiddenVisuals: [giant_box_clutter]
    numericChecks:
      - { type: focus-index-valid }
    imageChecks:
      - { type: color-presence, colorFamily: purple, minFraction: 0.001 }

  - sceneId: mlff.L3_graph
    level: mlff
    stepIndex: 2
    sceneKey: L3_graph
    primaryObject: ion_neighbor_graph
    visibleSubset: local_core
    focusAnchor: focus_center
    camera: { azimuthDeg: 72, elevationDeg: 14, rollDeg: 0, zoomIndex: 2, padding: 1.12 }
    timingWindows: { edgeOpacity: [0.2, 0.9] }
    requiredVisuals: [focus_ion_visible, local_neighbors, graph_edges]
    forbiddenVisuals: [distant_atoms, giant_box_clutter]
    numericChecks:
      - { type: subset-size-min, subset: local_core, min: 18 }
    imageChecks:
      - { type: edge-density-min, minDensity: 0.0015 }

  - sceneId: mlff.L4_energies
    level: mlff
    stepIndex: 3
    sceneKey: L4_energies
    primaryObject: ion_message_passing_local_graph
    visibleSubset: local_core
    focusAnchor: focus_center
    camera: { azimuthDeg: 96, elevationDeg: 12, rollDeg: 0, zoomIndex: 2, padding: 1.12 }
    timingWindows: { messageOpacity: [0.15, 0.9] }
    requiredVisuals: [focus_ion_visible, local_neighbors, message_markers]
    forbiddenVisuals: [distant_atoms]
    numericChecks:
      - { type: subset-size-min, subset: local_core, min: 18 }
    imageChecks:
      - { type: component-count-max, max: 120 }

  - sceneId: mlff.L5_forces
    level: mlff
    stepIndex: 4
    sceneKey: L5_forces
    primaryObject: ion_local_force_pattern
    visibleSubset: local_core
    focusAnchor: focus_center
    camera: { azimuthDeg: 48, elevationDeg: 24, rollDeg: 0, zoomIndex: 2, padding: 1.14 }
    timingWindows: { energyIntensity: [0.15, 0.9] }
    requiredVisuals: [focus_ion_visible, local_neighbors, force_display_selection]
    forbiddenVisuals: [uniform_upward_arrows, zero_force_display]
    numericChecks:
      - { type: nonzero-force-count-min, min: 4 }
      - { type: arrow-direction-std-min, minStdDeg: 18.0 }
    imageChecks:
      - { type: arrow-orientation-spread, minStdDeg: 18.0, colorFamily: purple }

  - sceneId: mlff.L6_comparison
    level: mlff
    stepIndex: 5
    sceneKey: L6_comparison
    primaryObject: ion_local_force_comparison
    visibleSubset: local_core
    focusAnchor: focus_center
    camera: { azimuthDeg: 20, elevationDeg: 26, rollDeg: 0, zoomIndex: 2, padding: 1.14 }
    timingWindows: { forceOpacity: [0.15, 0.9] }
    requiredVisuals: [focus_ion_visible, force_display_selection]
    forbiddenVisuals: [uniform_upward_arrows, zero_force_display]
    numericChecks:
      - { type: nonzero-force-count-min, min: 4 }
      - { type: arrow-direction-std-min, minStdDeg: 18.0 }
    imageChecks:
      - { type: arrow-orientation-spread, minStdDeg: 18.0, colorFamily: purple }

  - sceneId: mlff.L7_settle
    level: mlff
    stepIndex: 6
    sceneKey: L7_settle
    primaryObject: ion_hydration_neighborhood
    visibleSubset: expanded_local
    focusAnchor: focus_center
    camera: { azimuthDeg: 32, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.2 }
    timingWindows: { atomOpacity: [0.0, 1.0] }
    requiredVisuals: [focus_ion_visible, local_waters_visible]
    forbiddenVisuals: [giant_box_clutter]
    numericChecks:
      - { type: subset-size-min, subset: expanded_local, min: 60 }
    imageChecks:
      - { type: occupancy, minFraction: 0.012, maxFraction: 0.24 }

  - sceneId: dft.D1_transition
    level: dft
    stepIndex: 0
    sceneKey: D1_transition
    primaryObject: molecule_scaffold
    visibleSubset: molecule
    focusAnchor: molecule_center
    camera: { azimuthDeg: 34, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.22 }
    timingWindows: {}
    requiredVisuals: [atoms, bonds]
    forbiddenVisuals: [residual_density, homo, lumo, final_density]
    numericChecks:
      - { type: atom-count-min, min: 10 }
    imageChecks:
      - { type: occupancy, minFraction: 0.01, maxFraction: 0.18 }

  - sceneId: dft.D2_kinetic
    level: dft
    stepIndex: 1
    sceneKey: D2_kinetic
    primaryObject: molecule_scaffold
    visibleSubset: molecule
    focusAnchor: molecule_center
    camera: { azimuthDeg: 34, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.22 }
    timingWindows: {}
    requiredVisuals: [atoms, bonds, kinetic_glow]
    forbiddenVisuals: [residual_density, homo, lumo, final_density]
    numericChecks:
      - { type: atom-count-min, min: 10 }
    imageChecks:
      - { type: occupancy, minFraction: 0.01, maxFraction: 0.24 }

  - sceneId: dft.D3_Vext
    level: dft
    stepIndex: 2
    sceneKey: D3_Vext
    primaryObject: molecule_scaffold
    visibleSubset: molecule
    focusAnchor: molecule_center
    camera: { azimuthDeg: 54, elevationDeg: 20, rollDeg: 0, zoomIndex: 2, padding: 1.22 }
    timingWindows: {}
    requiredVisuals: [atoms, bonds]
    forbiddenVisuals: [residual_density, homo, lumo, final_density]
    numericChecks:
      - { type: atom-count-min, min: 10 }
    imageChecks:
      - { type: occupancy, minFraction: 0.01, maxFraction: 0.18 }

  - sceneId: dft.D4_Hartree
    level: dft
    stepIndex: 3
    sceneKey: D4_Hartree
    primaryObject: hartree_shells
    visibleSubset: molecule
    focusAnchor: molecule_center
    camera: { azimuthDeg: 20, elevationDeg: 26, rollDeg: 0, zoomIndex: 2, padding: 1.24 }
    timingWindows: {}
    requiredVisuals: [atoms, bonds, hartree_shells]
    forbiddenVisuals: [residual_density, homo, lumo, final_density]
    numericChecks:
      - { type: atom-count-min, min: 10 }
    imageChecks:
      - { type: color-presence, colorFamily: light_blue, minFraction: 0.001 }

  - sceneId: dft.D5_Vxc
    level: dft
    stepIndex: 4
    sceneKey: D5_Vxc
    primaryObject: exchange_correlation_shells
    visibleSubset: molecule
    focusAnchor: molecule_center
    camera: { azimuthDeg: 86, elevationDeg: 12, rollDeg: 0, zoomIndex: 2, padding: 1.24 }
    timingWindows: {}
    requiredVisuals: [atoms, bonds, vxc_shells]
    forbiddenVisuals: [residual_density, homo, lumo, final_density]
    numericChecks:
      - { type: atom-count-min, min: 10 }
    imageChecks:
      - { type: color-presence, colorFamily: amber, minFraction: 0.001 }

  - sceneId: dft.D6_density
    level: dft
    stepIndex: 5
    sceneKey: D6_density
    primaryObject: residual_density_snapshot
    visibleSubset: residual_density
    focusAnchor: molecule_center
    camera: { azimuthDeg: 38, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.28 }
    timingWindows: {}
    requiredVisuals: [one_residual_snapshot_only, constant_opacity, no_final_density]
    forbiddenVisuals: [converged_density, residual_accumulation]
    numericChecks:
      - { type: dft-residual-fixed-isovalue }
      - { type: dft-residual-area-ratio-min, minRatio: 0.025 }
    imageChecks:
      - { type: occupancy, minFraction: 0.012, maxFraction: 0.42 }

  - sceneId: dft.D7_bands
    level: dft
    stepIndex: 6
    sceneKey: D7_bands
    primaryObject: homo_surface
    visibleSubset: homo
    focusAnchor: molecule_center
    camera: { azimuthDeg: 56, elevationDeg: 20, rollDeg: 0, zoomIndex: 2, padding: 1.18 }
    preResetWaitMs: 600
    postResetWaitMs: 3200
    timingWindows: {}
    requiredVisuals: [homo_positive_phase, homo_negative_phase, atoms_faint]
    forbiddenVisuals: [lumo, residual_density, final_density]
    numericChecks:
      - { type: dft-homo-nonempty }
    imageChecks:
      - { type: color-presence, colorFamily: red, minFraction: 0.002 }
      - { type: color-presence, colorFamily: blue, minFraction: 0.002 }

  - sceneId: dft.D8_dos
    level: dft
    stepIndex: 7
    sceneKey: D8_dos
    primaryObject: lumo_surface
    visibleSubset: lumo
    focusAnchor: molecule_center
    camera: { azimuthDeg: 114, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.18 }
    preResetWaitMs: 600
    postResetWaitMs: 3200
    timingWindows: {}
    requiredVisuals: [lumo_positive_phase, lumo_negative_phase, atoms_faint]
    forbiddenVisuals: [homo, residual_density, final_density]
    numericChecks:
      - { type: dft-lumo-nonempty }
    imageChecks:
      - { type: color-presence, colorFamily: red, minFraction: 0.002 }
      - { type: color-presence, colorFamily: blue, minFraction: 0.002 }

  - sceneId: dft.D9_settle
    level: dft
    stepIndex: 8
    sceneKey: D9_settle
    primaryObject: final_density
    visibleSubset: final_density
    focusAnchor: molecule_center
    camera: { azimuthDeg: 34, elevationDeg: 18, rollDeg: 0, zoomIndex: 2, padding: 1.24 }
    timingWindows: {}
    requiredVisuals: [final_density, atoms_faint, bonds_faint]
    forbiddenVisuals: [residual_density]
    numericChecks:
      - { type: dft-final-density-nonempty }
    imageChecks:
      - { type: occupancy, minFraction: 0.01, maxFraction: 0.3 }
